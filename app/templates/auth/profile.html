{% extends 'base.html' %}
{% block content %}
<div class="page-header flex-between">
  <div><h2>الملف الشخصي</h2></div>
</div>
<div class="card" style="max-width:480px">
  <div class="card-body">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--surface-high)">
      <div style="width:64px;height:64px;border-radius:50%;background:var(--secondary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800">{{ current_user.initials }}</div>
      <div><h3 style="font-size:18px;font-weight:700">{{ current_user.full_name }}</h3><p style="color:var(--outline)">{{ current_user.role.name_ar }}</p></div>
    </div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group"><label class="form-label">الاسم الكامل</label><input type="text" name="full_name" class="form-control" value="{{ current_user.full_name }}" required/></div>
      <div class="form-group"><label class="form-label">البريد الإلكتروني</label><input type="email" name="email" class="form-control" value="{{ current_user.email }}" required/></div>
      <div class="divider"></div>
      <div class="form-group"><label class="form-label">كلمة المرور الحالية</label><input type="password" name="current_password" class="form-control"/></div>
      <div class="form-group"><label class="form-label">كلمة المرور الجديدة</label><input type="password" name="new_password" class="form-control" placeholder="اتركه فارغاً للإبقاء على الحالية"/></div>
      <button type="submit" class="btn btn-primary"><span class="material-symbols-outlined">save</span> حفظ التغييرات</button>
    </form>
  </div>
</div>
{% endblock %}
