{% extends 'base.html' %}
{% block content %}
<div class="page-header flex-between">
  <div><h2>{{ title }}</h2></div>
  <a href="{{ url_for('inventory.index') }}" class="btn btn-secondary">العودة</a>
</div>
<div class="card" style="max-width:640px">
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      
      <div class="form-group">
        <label class="form-label">صورة المنتج</label>
        <div style="display:flex;gap:16px;align-items:center">
          {% if product and product.image %}
          <img src="{{ url_for('static', filename='uploads/products/' + product.image) }}" style="width:80px;height:80px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--outline-var)"/>
          {% else %}
          <div style="width:80px;height:80px;background:var(--surface-low);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--outline)"><span class="material-symbols-outlined">image</span></div>
          {% endif %}
          <input type="file" name="image" class="form-control" accept="image/*"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group"><label class="form-label">SKU</label><input type="text" name="sku" class="form-control num" value="{{ product.sku if product else '' }}" placeholder="اختياري"/></div>
        <div class="form-group"><label class="form-label">الفئة</label><input type="text" name="category" class="form-control" value="{{ product.category if product else '' }}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">الاسم (إنجليزي) *</label><input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required/></div>
        <div class="form-group"><label class="form-label">الاسم (عربي)</label><input type="text" name="name_ar" class="form-control" value="{{ product.name_ar if product else '' }}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">سعر الشراء *</label><input type="number" name="cost_price" class="form-control num" value="{{ product.cost_price | float if product else 0 }}" min="0" step="any" required/></div>
        <div class="form-group"><label class="form-label">سعر البيع *</label><input type="number" name="unit_price" class="form-control num" value="{{ product.unit_price | float if product else 0 }}" min="0" step="any" required/></div>
      </div>
      <div class="form-row">
        {% if not product %}
        <div class="form-group"><label class="form-label">الكمية الابتدائية</label><input type="number" name="stock_qty" class="form-control num" value="0" min="0" step="any"/></div>
        {% endif %}
        <div class="form-group"><label class="form-label">الحد الأدنى للمخزون</label><input type="number" name="min_stock" class="form-control num" value="{{ product.min_stock | float if product else 0 }}" min="0" step="any"/></div>
        <div class="form-group"><label class="form-label">وحدة القياس</label><input type="text" name="unit" class="form-control" value="{{ product.unit if product else 'قطعة' }}"/></div>
      </div>
      <div class="form-group"><label class="form-label">الحساب المحاسبي</label>
        <select name="account_id" class="form-control searchable-select"><option value="">-- اختر الحساب المحاسبي --</option>
          {% for acc in accounts %}<option value="{{ acc.id }}" {{ 'selected' if product and product.account_id==acc.id }}>{{ acc.code }} — {{ acc.name_ar }}</option>{% endfor %}
        </select>
      </div>
      {% if product %}
      <div class="form-group" style="display:flex;gap:8px;align-items:center">
        <input type="checkbox" name="is_active" id="is_active" {{ 'checked' if product.is_active }}/>
        <label for="is_active" class="form-label" style="margin:0">منتج نشط</label>
      </div>
      {% endif %}
      <div class="flex gap-2"><button type="submit" class="btn btn-primary"><span class="material-symbols-outlined">save</span> حفظ</button><a href="{{ url_for('inventory.index') }}" class="btn btn-secondary">إلغاء</a></div>
    </form>
  </div>
</div>
{% endblock %}
