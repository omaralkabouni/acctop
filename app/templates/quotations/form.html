{% extends 'base.html' %}
{% block extra_js %}
<script>
window.__products = [
  {% for p in products %}
  {id: {{ p.id }}, name: {{ p.name | tojson }}, name_ar: {{ (p.name_ar or p.name) | tojson }}, unit_price: {{ p.unit_price | float }}},
  {% endfor %}
];
document.addEventListener('DOMContentLoaded', () => {
  {% if quote and quote.lines %}
    {% for line in quote.lines %}
      InvoiceForm.addLine({
        product_id: "{{ line.product_id or '' }}",
        description: {{ line.description | tojson }},
        qty: {{ line.qty | float }},
        unit_price: {{ line.unit_price | float }},
        discount_pct: {{ line.discount_pct | float }}
      });
    {% endfor %}
  {% else %}
    InvoiceForm.addLine();
  {% endif %}
  InvoiceForm.updateTotals();
  
  {% if quote and quote.manual_party_name %}
    document.getElementById('is_manual_customer').checked = true;
    toggleCustomerInput();
  {% endif %}
});
</script>
{% endblock %}

{% block content %}
<div class="page-header flex-between">
  <div><h2>{{ title }}</h2></div>
  <a href="{{ url_for('quotations.index') }}" class="btn btn-secondary">العودة</a>
</div>

<form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
  
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:16px">
    <div class="card">
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <div class="flex-between">
              <label class="form-label">العميل *</label>
              <label style="font-size: 12px; cursor: pointer; color: var(--primary)">
                <input type="checkbox" id="is_manual_customer" onchange="toggleCustomerInput()"> عميل غير مسجل؟
              </label>
            </div>
            <div id="select_customer_wrapper">
              <select name="party_id" id="party_id_select" class="form-control searchable-select" required>
                <option value="">-- اختر العميل --</option>
                {% for c in customers %}
                  <option value="{{ c.id }}" {% if quote and quote.party_id == c.id %}selected{% endif %}>{{ c.display_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div id="manual_customer_wrapper" style="display:none">
              <input type="text" name="manual_party_name" id="manual_name" class="form-control" placeholder="أدخل اسم العميل يدوياً..." style="margin-bottom:8px" value="{{ quote.manual_party_name if quote else '' }}"/>
              <input type="text" name="manual_party_phone" id="manual_phone" class="form-control" placeholder="رقم الهاتف (إجباري للعميل الجديد)" value="{{ quote.manual_party_phone if quote else '' }}"/>
            </div>
          </div>
          <script>
            function toggleCustomerInput() {
              const isManual = document.getElementById('is_manual_customer').checked;
              document.getElementById('select_customer_wrapper').style.display = isManual ? 'none' : 'block';
              document.getElementById('manual_customer_wrapper').style.display = isManual ? 'block' : 'none';
              
              const sel = document.getElementById('party_id_select');
              const mName = document.getElementById('manual_name');
              const mPhone = document.getElementById('manual_phone');
              
              if (isManual) {
                sel.value = "";
                sel.required = false;
                mName.required = true;
                mPhone.required = true;
              } else {
                sel.required = true;
                mName.required = false;
                mPhone.required = false;
                if (!"{{ quote.id if quote else '' }}") { // Only clear if new
                   mName.value = "";
                   mPhone.value = "";
                }
              }
            }
          </script>
          <div class="form-group">
            <label class="form-label">رقم عرض السعر</label>
            <input type="text" name="number" class="form-control" placeholder="تلقائي" value="{{ quote.number if quote else '' }}" {% if quote %}readonly{% endif %}/>
          </div>
          <div class="form-group">
            <label class="form-label">التاريخ *</label>
            <input type="date" name="date" class="form-control" value="{{ quote.date.isoformat() if quote else today }}" required/>
          </div>
          <div class="form-group">
            <label class="form-label">صالح لغاية (اختياري)</label>
            <input type="date" name="due_date" class="form-control" value="{{ quote.due_date.isoformat() if quote and quote.due_date else '' }}"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">ملاحظات العرض</label>
          <textarea name="notes" class="form-control" rows="2" placeholder="تظهر في الفاتورة عند التحويل...">{{ quote.notes if quote else '' }}</textarea>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-body">
        {% if sys_settings.show_tax %}
        <div class="form-group">
          <label class="form-label">الضريبة (%)</label>
          <input type="number" name="tax_rate" id="tax_rate" class="form-control num" value="{{ quote.tax_rate if quote else (sys_settings.tax_rate if sys_settings else 15) }}" min="0" max="100" step="any" onchange="InvoiceForm.updateTotals()"/>
        </div>
        {% else %}
          <input type="hidden" name="tax_rate" id="tax_rate" value="0"/>
        {% endif %}
        
        <div class="form-group">
          <label class="form-label">خصم إجمالي (%)</label>
          <input type="number" name="discount_pct" id="discount_pct" class="form-control num" value="{{ quote.discount_pct if quote else 0 }}" min="0" max="100" step="any" onchange="InvoiceForm.updateTotals()"/>
        </div>

        <div class="invoice-summary">
          <div class="summary-row"><span>المجموع الفرعي</span><span class="num" id="summary-subtotal">0</span></div>
          <div class="summary-row total"><span>الإجمالي التقريبي</span><span class="num" id="summary-total">0</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-header flex-between">
      <h4>البنود والأسعار</h4>
      <button type="button" onclick="InvoiceForm.addLine()" class="btn btn-secondary btn-sm"><span class="material-symbols-outlined">add</span> إضافة بند</button>
    </div>
    <div class="table-wrapper">
      <table class="invoice-lines-table">
        <thead>
          <tr>
            <th style="width:200px">المنتج</th>
            <th>الوصف</th>
            <th style="width:90px">الكمية</th>
            <th style="width:120px">السعر المقترح</th>
            <th style="width:80px">خصم %</th>
            <th style="width:110px">الإجمالي</th>
            <th style="width:40px"></th>
          </tr>
        </thead>
        <tbody id="invoice-lines-body"></tbody>
      </table>
    </div>
  </div>

  <div class="flex gap-2">
    <button type="submit" class="btn btn-primary">
      <span class="material-symbols-outlined">save</span> حفظ عرض السعر
    </button>
    <a href="{{ url_for('quotations.index') }}" class="btn btn-ghost">إلغاء</a>
  </div>
</form>
{% endblock %}
