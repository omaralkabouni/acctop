{% extends 'base.html' %}
{% block content %}
<div class="page-header flex-between">
  <div><h2>{{ title }}</h2></div>
  <a href="{{ url_for('parties.index') }}" class="btn btn-secondary">العودة</a>
</div>
<div class="card" style="max-width:580px">
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">النوع *</label>
          <select name="type" class="form-control" required>
            <option value="customer" {{ 'selected' if not party or party.type=='customer' }}>عميل</option>
            <option value="supplier" {{ 'selected' if party and party.type=='supplier' }}>مورد</option>
            <option value="both" {{ 'selected' if party and party.type=='both' }}>عميل ومورد</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">الاسم *</label>
          <input type="text" name="name" class="form-control" value="{{ party.name if party else '' }}" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">الاسم (عربي)</label><input type="text" name="name_ar" class="form-control" value="{{ party.name_ar if party else '' }}"/></div>
        <div class="form-group"><label class="form-label">الهاتف</label><input type="tel" name="phone" class="form-control" value="{{ party.phone if party else '' }}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">البريد الإلكتروني (اختياري)</label><input type="email" name="email" class="form-control" value="{{ party.email if party else '' }}"/></div>
        <div class="form-group"><label class="form-label">الرقم الضريبي</label><input type="text" name="tax_number" class="form-control" value="{{ party.tax_number if party else '' }}"/></div>
      </div>
      <div class="form-group"><label class="form-label">العنوان</label><textarea name="address" class="form-control" rows="2">{{ party.address if party else '' }}</textarea></div>
      <div class="form-group"><label class="form-label">الحد الائتماني (ر.س)</label><input type="number" name="credit_limit" class="form-control num" value="{{ party.credit_limit | float if party else 0 }}" min="0" step="any"/></div>
      <div class="form-group"><label class="form-label">ملاحظات</label><textarea name="notes" class="form-control" rows="2">{{ party.notes if party else '' }}</textarea></div>
      {% if party %}
      <div class="form-group" style="display:flex;gap:8px;align-items:center">
        <input type="checkbox" name="is_active" id="is_active" {{ 'checked' if party.is_active }}/>
        <label for="is_active" class="form-label" style="margin:0">نشط</label>
      </div>
      {% endif %}
      <div class="flex gap-2"><button type="submit" class="btn btn-primary"><span class="material-symbols-outlined">save</span> حفظ</button><a href="{{ url_for('parties.index') }}" class="btn btn-secondary">إلغاء</a></div>
    </form>
  </div>
</div>
{% endblock %}
